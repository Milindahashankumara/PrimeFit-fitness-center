
services:
  backend:
    build: ./fitness_center-backend
    container_name: fitness_center_backend
    ports:
      - "5000:5000"
    volumes:
      - ./fitness_center-backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/fitness_center
      - JWT_SECRET=your_jwt_secret_here
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
    networks:
      - fitness-network

  frontend:
    build: ./fitness_center-frontend
    container_name: fitness_center_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    stdin_open: true
    tty: true
    command: npm run dev
    volumes:
      - ./fitness_center-frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - fitness-network

  mongo:
    image: mongo:7.0
    container_name: fitness_center_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - fitness-network

volumes:
  mongo-data:

networks:
  fitness-network:
    driver: bridge
